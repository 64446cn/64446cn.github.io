<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jy破解命令和软件</title>
    <style>
        /* 简单的按钮样式 */
        .copy-button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }
        .copy-button:hover {
            background-color: #45a049;
        }
        /* 提示信息样式 */
        .message {
            margin-top: 10px;
            color: green;
            display: none;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #333;
            color: #fff;
            padding: 10px 0;
            text-align: center;
        }

        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        nav ul li {
            margin: 0 15px;
        }

        nav ul li a {
            color: #fff;
            text-decoration: none;
        }

        section {
            padding: 20px;
            margin: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .software {
            margin-bottom: 15px;
        }

        .software a {
            display: inline-block;
            padding: 10px 15px;
            background-color: #28a745;
            color: #fff;
            text-decoration: none;
            border-radius: 3px;
        }

        footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 10px 0;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>jyjk命令和软件</h1>
        <nav>
            <ul>
                <li><a href="#cmdml">CMD命令</a></li>
                <li><a href="#download">jk软件下载</a></li>
                <li><a href="#qtjc">其他教程</a></li>
            </ul>
        </nav>
    </header>

    <section id="cmdml">
        <h2>CMD命令</h2>
        <h3>操作方法：Win+R打开运行框，输入cmd，在黑色的cmd窗口中输入下方命令↓，可直接关闭jy</h3>
        <p>taskkill /f /im StudentMain.exe</p>
        <h3>缺点：1.容易被教师机发现 2.无法收到教师机发送的文件 3.无法提交文件</h3>
        <button class="copy-button" onclick="copyText()">点击复制</button>
        <div class="message" id="message">文本已复制！</div>
    </section>

    <section id="download">
        <h2>jk软件下载（windows平台）</h2>
        <div class="software">
            <h3>JiYuTrainer</h3>
            <p>作者：快乐的梦鱼</p>
            <p>下载完成后直接打开exe文件即可，关于软件详情可查看使用文档</p>
            <a href="http://64446.cn/jyjk/JiYuTrainer.exe" target="_blank">直接下载</a>
            <a href="http://64446.cn/jyjk/" target="_blank">使用文档</a>
        </div>
        <!-- 添加更多软件 -->
    </section>


    <section id="qtjc">
        <div class="software">
            <h2>其他教程</h2>
            <p>无</p>
        </div>
    </section>


    <script>
        function copyText() {
            // 创建一个临时的textarea元素
            const textarea = document.createElement('textarea');
            textarea.value = 'taskkill /f /im StudentMain.exe';
            // 将textarea元素添加到body中
            document.body.appendChild(textarea);
            // 选择文本
            textarea.select();
            // 执行复制命令
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    // 显示提示信息
                    document.getElementById('message').style.display = 'block';
                } else {
                    alert('复制失败，请手动复制。');
                }
            } catch (err) {
                alert('复制失败，请手动复制。');
            }
            // 移除临时的textarea元素
            document.body.removeChild(textarea);
            // 3秒后隐藏提示信息
            setTimeout(() => {
                document.getElementById('message').style.display = 'none';
            }, 3000);
        }
    </script>

</body>
</html>
